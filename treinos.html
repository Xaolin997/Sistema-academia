<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Academia — Meus Treinos</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/treinos/treinos.css" />
</head>
<body>

  <header class="header"></header>
  <aside class="sidebar"></aside>

  <main>

    <div class="treinos-page-header">
      <h1 class="treinos-page-title">Meus Treinos</h1>
      <button class="btn btn-primary" id="novo-treino-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Novo Treino
      </button>
    </div>

    <div class="treinos-list" id="treinos-list"></div>

    <section>
      <div class="section-header">
        <h2 class="section-title">Calendário Semanal</h2>
      </div>
      <div id="calendario-semanal" style="background:var(--clr-surface);border:1px solid var(--clr-border);border-radius:var(--radius-md);padding:24px">
        <p style="color:var(--clr-muted);font-size:.85rem;text-align:center">Configure seu calendário na página inicial.</p>
      </div>
    </section>

  </main>

  <footer class="footer">RODAPÉ</footer>

  <script type="module" src="js/treinos.js"></script>
</body>
</html>
